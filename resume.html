<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aayush — Resume</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div id="curtain"></div>

  <nav>
    <a href="index.html" class="logo">Aayush.dev</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="certifications.html">Certifications</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div style="display:flex; align-items:center; gap:0.8rem;">
      <a href="resume.html" class="btn nav-resume-btn active" aria-label="View Resume">Resume</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <span class="toggle-icon">☾</span>
        <span class="toggle-label">Dark</span>
      </button>
      <button class="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section>
    <div class="section-inner">
      <div class="resume-header fade-in">
        <div>
          <p class="section-label">My Resume</p>
          <h1 class="section-title" style="margin-bottom:0;">Aayush</h1>
          <p style="color:var(--text-muted); font-size:0.95rem; margin-top:0.5rem;">Full-Stack Developer · Open to Opportunities</p>
        </div>
        <a href="resume.pdf" download="Aayush_Resume.pdf" class="btn resume-download-btn" aria-label="Download Resume PDF">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download PDF
        </a>
      </div>

      <!-- Resume viewer -->
      <div class="resume-viewer fade-in">
        <object
          data="resume.pdf"
          type="application/pdf"
          class="resume-iframe"
          aria-label="Resume PDF viewer"
        >
          <iframe src="resume.pdf" class="resume-iframe" title="Aayush Resume">
            <p style="padding:2rem; color:var(--text-muted); text-align:center;">
              PDF preview not supported in this browser.
              <a href="resume.pdf" download="Aayush_Resume.pdf" class="btn" style="margin-top:1rem; display:inline-flex;">Download PDF</a>
            </p>
          </iframe>
        </object>
      </div>

    </div>
  </section>

  <canvas class="canvas-divider" aria-hidden="true"></canvas>

  <footer>
    <p>&copy; 2026 Aayush</p>
    <nav>
      <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </footer>

  <div class="toast" id="toast"></div>

  <div class="whatsapp-float" id="whatsappFloat" aria-label="Chat on WhatsApp">
    <svg viewBox="0 0 24 24" aria-hidden="true">

    </svg>
  </div>

  <!-- WhatsApp Dialog -->
  <div class="whatsapp-dialog" id="whatsappDialog">
    <div class="whatsapp-dialog-header">
      <h3>Chat with Aayush</h3>
      <button class="whatsapp-close-btn" id="whatsappClose" aria-label="Close chat">×</button>
    </div>
    <div class="whatsapp-dialog-body">
      <p class="whatsapp-greeting">Hello! 👋<br>How can I help you today? Feel free to send me a message!</p>
      <div class="whatsapp-input-group">
        <textarea class="whatsapp-input" id="whatsappInput" placeholder="Type your message..." rows="1"></textarea>
        <button class="whatsapp-send-btn" id="whatsappSend">Send</button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
